name: Update conditions data

on:
  schedule:
    - cron: "*/20 * * * *"
  workflow_dispatch: {}

permissions:
  contents: write

concurrency:
  group: update-conditions
  cancel-in-progress: false

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm ci

      - name: Fetch latest conditions
        run: npm run fetch-conditions

      - name: Commit and push if changed
        run: |
          if git diff --quiet -- public/data/conditions.json; then
            echo "No changes to conditions.json"
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add public/data/conditions.json
          git commit -m "Update conditions data"
          git push
